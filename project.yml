name: ZeroDevOps
options:
  bundleIdPrefix: com.devopsbootcamp
  deploymentTarget:
    iOS: "16.0"
  xcodeVersion: "15"
  createIntermediateGroups: true
  groupSortPosition: top
  generateEmptyDirectories: false

settings:
  base:
    SWIFT_VERSION: "5.9"
    ENABLE_BITCODE: NO
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"

packages:
  AppAuth:
    url: https://github.com/openid/AppAuth-iOS
    from: "1.7.0"

targets:
  ZeroDevOps:
    type: application
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - ZeroDevOps
    resources:
      - ZeroDevOps/Assets.xcassets
    info:
      path: ZeroDevOps/Info.plist
      properties:
        UILaunchStoryboardName: ""
        CFBundleURLTypes:
          - CFBundleURLSchemes:
              - com.devopsbootcamp.app
            CFBundleURLName: com.devopsbootcamp.app
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: false
        UIRequiresFullScreen: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.devopsbootcamp.app
        INFOPLIST_FILE: ZeroDevOps/Info.plist
        SWIFT_VERSION: "5.9"
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: ""
    dependencies:
      - package: AppAuth

  ZeroDevOpsTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - ZeroDevOpsTests
    dependencies:
      - target: ZeroDevOps
